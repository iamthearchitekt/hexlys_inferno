<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="hexly_icon.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexly's Inferno Escape - Retro 2D Platformer</title>
    <!-- Import Google Fonts for professional retro chiptune and modern styles -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="arcade-cabinet">
        <div id="game-container">
            <!-- Dev Mode Toolbar -->
            <div id="dev-toolbar" style="position: absolute; top: 10px; right: 10px; z-index: 100; display: flex; gap: 10px; align-items: center;">
                <select id="dev-palette" style="background: rgba(0,0,0,0.7); color: #fff; border: 2px solid #aaa; padding: 5px; font-family: 'Press Start 2P', monospace; font-size: 10px; display: none;">
                    <option value="7">Soul Shard</option>
                    <option value="1">Floor Tile</option>
                    <option value="3">Breakable Block</option>
                    <option value="4">Reward Block</option>
                    <option value="2">Chain Platform</option>
                    <option value="14">Falling Platform</option>
                    <option value="5">Lava</option>
                    <option value="16">Toxic Swamp</option>
                    <option value="18">1-Up Block</option>
                    <option value="19">Soul Reward Block</option>
                    <option value="0">-- None --</option>
                </select>
                <select id="dev-enemy-palette" style="background: rgba(0,0,0,0.7); color: #fff; border: 2px solid #aaa; padding: 5px; font-family: 'Press Start 2P', monospace; font-size: 10px; display: none;">
                    <option value="0">-- Enemies --</option>
                    <option value="8">Skelly Bug</option>
                    <option value="9">Winged Skull</option>
                    <option value="15">Ghost</option>
                    <option value="17">Bog Zombie</option>
                </select>
                <button id="dev-toggle-btn" style="background: rgba(0,0,0,0.7); color: #fff; border: 2px solid #ff4400; padding: 5px 10px; cursor: pointer; font-family: 'Press Start 2P', monospace; font-size: 10px;">DEV MODE: OFF</button>
                <button id="dev-export-btn" style="background: rgba(0,0,0,0.7); color: #fff; border: 2px solid #00ffaa; padding: 5px 10px; cursor: pointer; font-family: 'Press Start 2P', monospace; font-size: 10px; display: none;">EXPORT LAYOUT</button>
            </div>

            <!-- HTML5 Game Canvas -->
            <canvas id="gameCanvas" width="960" height="540"></canvas>

            <!-- HUD Overlay (Visible during active gameplay) -->
            <div id="hud-overlay" class="hidden">
                <div class="hud-item" id="hud-health">
                    <div class="heart-container" id="heart-container"></div>
                </div>
                <div class="hud-item" id="hud-score">
                    <span class="hud-label">SCORE:</span>
                    <span class="hud-value" id="score-val">000000</span>
                </div>
                <!-- Dev-build hint: only visible when DEV_MODE=true -->
                <div id="dev-hint">[ ` ] LEVEL MENU</div>
            </div>

            <!-- Title Screen Overlay -->
            <div id="title-screen" class="overlay-screen">
                <!-- High-Definition Loopable Background Video (HTML5 Muted Autoplay) -->
                <video id="title-bg-video" autoplay loop muted playsinline>
                    <source src="start.mp4" type="video/mp4">
                </video>

                <!-- Dynamic Spacer to align floating control cards in the bottom half -->
                <div class="title-spacer"></div>

                <div class="menu-actions">
                    <button id="start-btn" class="arcade-btn start-img-btn pulse">
                        <img src="game ui/start_btn.png" alt="START" class="start-btn-img">
                    </button>
                </div>
            </div>

            <!-- Pause Screen Overlay -->
            <div id="pause-screen" class="overlay-screen hidden">
                <div class="pause-box">
                    <h2 class="screen-heading">DEPTHS PAUSED</h2>
                    <p class="blink">PRESS 'P' TO RESUME</p>
                    <button id="resume-btn" class="arcade-btn small-btn">RESUME</button>
                    <button id="pause-reset-btn" class="arcade-btn small-btn outline-btn">RESTART (R)</button>
                </div>
            </div>

            <!-- Game Over Screen Overlay -->
            <div id="game-over-screen" class="overlay-screen hidden">
                <div class="game-over-box">
                    <div class="game-over-frame-container">
                        <img src="game ui/game_over.png" alt="GAME OVER" class="game-over-frame1">
                        <img src="game ui/game_over2.png" alt="GAME OVER" class="game-over-frame2">
                    </div>
                    <img src="game ui/try_again.png" alt="TRY AGAIN" class="try-again-btn glowing-pulse" style="margin-top: 10px; width: 350px; cursor: pointer;">
                    <!-- Hidden elements for backward compatibility with game.js updating -->
                    <div style="display: none;">
                        <span id="go-score"></span>
                        <span id="go-coins"></span>
                    </div>
                </div>
            </div>

            <!-- Tally Screen Overlay -->
            <div id="tally-screen" class="overlay-screen hidden">
                <div class="victory-box">
                    <h2 id="tally-heading" class="screen-heading success-text">CIRCLE CLEARED</h2>
                    <p id="tally-subtext" class="victory-subtext">Hexly successfully leaped out of the underworld!</p>
                    
                    <div class="stats-container">
                        <div class="stat-card">
                            <span class="stat-lbl">TOTAL SCORE</span>
                            <span class="stat-val" id="v-score">000000</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-lbl">SOULS SAVED</span>
                            <span class="stat-val" id="v-coins">0</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-lbl">ESCAPE TIME</span>
                            <span class="stat-val" id="v-time">0</span>
                        </div>
                    </div>

                    <img src="try_again_button.png" alt="TRY AGAIN" class="try-again-btn blink" style="margin-top: 20px; width: 250px; cursor: pointer;">
                </div>
            </div>

            <!-- Toast / Message system overlay -->
            <div id="toast-message" class="hidden">COULDN'T BUMP BLOCK!</div>
        </div>
    </div>

    <!-- Dev Mode Configuration -->
    <script>
        const DEV_MODE = true; // Set to false for production to disable dev menu
    </script>

    <!-- Levels -->
    <script src="levels/level1.js"></script>
    <script src="levels/level2.js"></script>
    <script src="levels/level3.js"></script>
    <script src="levels/level4.js"></script>
    <script src="levels/level5.js"></script>
    <script src="levels/level6.js"></script>
    <script src="levels/level7.js"></script>
    <script src="levels/level8.js"></script>
    <script src="levels/level9.js"></script>

    <!-- Core Engine Scripts -->
    <script src="src/level_validator.js"></script>
    <script src="src/dev_menu.js"></script>
    <script src="audiosynth.js"></script>
    <script src="levels.js"></script>
    <script src="src/constants.js"></script>
    <script src="src/assets.js"></script>
    <script src="src/particles.js"></script>
    <script src="src/entities.js"></script>
    <script src="src/input.js"></script>
    <script src="src/engine.js"></script>
</body>
</html>
